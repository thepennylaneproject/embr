name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: embr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/embr_test"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/embr_test"

      - name: Run migrations
        run: npm run db:migrate:deploy
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/embr_test"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/embr_test"

      - name: Validate API Prisma schema
        run: npm --prefix apps/api run db:validate

      - name: Typecheck Web
        run: npx tsc --noEmit --project apps/web/tsconfig.json

      - name: Build Web
        run: npm --prefix apps/web run build

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk Security Scan
        if: ${{ secrets.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
